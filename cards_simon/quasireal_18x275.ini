
[main]

#quasi-real configuration

Ee = 18 ; energy of electron beam, GeV
Ep = 275 ; proton beam, GeV
#write_tx = true
#write_hepmc = true
write_hepmc_root = true
#write_root = true

#range in x
xmin = 1e-12
xmax = 1

#range in y
ymin = 1e-4
ymax = 0.99

#minimal W, GeV
Wmin = 1

#range in Q^2
Q2min = 1e-10
Q2max = 1e7

#select the quasi-real parametrization
model = "quasi-real"

#number of events to generate
#nev = 10000000
nev = 10000

#output file name
#nam = "/scratch/EIC/Events/QR/qr_18x275"
nam = "/scratch/EIC/Events/qr_18x275_big"

[beam_effects]

#beam effects of angular divergence and vertex spread

use_beam_effects = true ; apply beam effects, true or false

sig_x = 0.189 ; vertex spread in x, mm
sig_y = 0.01 ; vertex spread in y, mm
sig_z = 32.92 ; vertex spread in z, mm
sig_t = 0.03 ; spread in time from vertex in ns

theta_x = 202e-6 ; divergence in x, rad
theta_y = 187e-6 ; divergence in y, rad