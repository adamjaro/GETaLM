
[main]

#electron beam configuration

Ee = 5 ; energy of electron beam, GeV

#beam model
model = "electron-beam"

#number of events to generate
nev = 100000

#relative energy spread
espread = 1e-3

#output file name
nam = "/scratch/EIC/Events/el_beam_5"

#write_tx = true
#write_root = true
write_hepmc = true

[beam_effects]

#beam effects of angular divergence and emittance

use_beam_effects = true ; apply beam effects, true or false

#theta_x = 163e-6
#theta_y = 202e-6

#sig_x = 0.236 ; vertex spread in x, mm
#sig_y = 0.0162 ; vertex spread in y, mm
#sig_z = 17.0 ; vertex spread in z, mm



sig_x = 0.2429 ; vertex spread in x, mm
sig_y = 0.0250197 ; vertex spread in y, mm
sig_z = 37.77 ; vertex spread in z, mm
theta_x = 101e-6 ; divergence in x, rad
theta_y = 129e-6 ; divergence in y, rad 