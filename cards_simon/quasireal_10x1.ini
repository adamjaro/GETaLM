
[main]

#quasi-real configuration

Ee = 10 ; energy of electron beam, GeV
Ep = 1 ; proton beam, GeV
#write_tx = true
#write_hepmc = true
write_hepmc_root = true

#range in x
xmin = 1e-12
xmax = 1

#range in y
ymin = 1e-4
ymax = 0.99

#minimal W, GeV
Wmin = 1

#range in Q^2
Q2min = 1e-10
Q2max = 1e7

#select the quasi-real parametrization
model = "quasi-real"

#number of events to generate
nev = 1000000

#output file name
nam = "/scratch/EIC/Events/QR/qr_10x1"

[beam_effects]

#NOT CORRECT FOR SETTINGS (MAYBE)

#beam effects of angular divergence and vertex spread

use_beam_effects = true ; apply beam effects, true or false

sig_x = 0.100 ; vertex spread in x, mm
sig_y = 0.100 ; vertex spread in y, mm
sig_z = 14.43 ; vertex spread in z, mm
sig_t = 0.03 ; spread in time from vertex in ns

theta_x = 100e-6 ; divergence in x, rad
theta_y = 100e-6 ; divergence in y, rad