
[main]

#quasi-real configuration

Ee = 5 ; energy of electron beam, GeV
Ep = 100 ; proton beam, GeV
#write_tx = true
write_hepmc = true

#range in x
xmin = 1e-11
xmax = 1

#range in y
ymin = 1e-4
ymax = 0.99

#minimal W, GeV
Wmin = 2

#range in Q^2
Q2min = 1e-9
Q2max = 1e7

#select the quasi-real parametrization
model = "quasi-real"

#number of events to generate
nev = 10000000

#output file name
nam = "/scratch/EIC/Events/QR/qr_5x100"

[beam_effects]

#beam effects of angular divergence and vertex spread

use_beam_effects = false ; apply beam effects, true or false

sig_x = 0.2429 ; vertex spread in x, mm
sig_y = 0.0250189 ; vertex spread in y, mm
sig_z = 37.77 ; vertex spread in z, mm

theta_x = 101e-6 ; divergence in x, rad
theta_y = 1129e-6 ; divergence in y, rad