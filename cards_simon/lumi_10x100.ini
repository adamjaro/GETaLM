
[main]

#bremsstrahlung generator for luminosity system

#Ee = 18 ; energy of electron beam, GeV
#Ep = 275 ; proton beam, GeV
Ee = 10
Ep = 1

#A = 197 ; nucleus
#Z = 79

emin = 0.1 ; minimal photon energy, GeV

#parametrization
#model = "h1"
model = "zeus"
#model = "Lifshitz_93p16"

#maximal delta in nucleus frame for Lifshitz model
dmax_n = 200

#number of events to generate
nev = 1000000

#output file name
nam = "/scratch/EIC/Events/Brems/brems_10x100"

#write_hepmc = true
write_hepmc_root = true

[beam_effects]

#beam effects of angular divergence and vertex spread

use_beam_effects = false ; apply beam effects, true or false

sig_x = 0.10 ; vertex spread in x, mm
sig_y = 0.10 ; vertex spread in y, mm
sig_z = 14.43 ; vertex spread in z, mm

theta_x = 100e-6 ; divergence in x, rad
theta_y = 100e-6 ; divergence in y, rad

